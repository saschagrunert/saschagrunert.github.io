<!doctype html>
<html lang="en">
  <head>
    <title>Page Not Found - Sascha Grunert</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0c17" />
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/fonts.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0c17;
        color: #fff;
        font-family: "Montserrat", sans-serif;
        text-align: center;
        padding: 20px;
      }
      h1 {
        font-size: 120px;
        font-weight: 700;
        margin: 0;
        line-height: 1;
        color: #69d2e7;
      }
      p {
        font-size: 18px;
        color: #a0a0a0;
        margin: 10px 0 30px;
      }
      a {
        display: inline-block;
        padding: 14px 40px;
        font-family: "Poppins", sans-serif;
        text-transform: uppercase;
        border-radius: 50px;
        font-size: 12px;
        letter-spacing: 1px;
        background: #fff;
        color: #333;
        font-weight: bold;
        text-decoration: none;
      }
      a:hover {
        background: #e0e0e0;
      }
      a:focus-visible {
        outline: 2px solid #69d2e7;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>This page does not exist.</p>
      <a href="/">Go Home</a>
    </main>
  </body>
</html>
