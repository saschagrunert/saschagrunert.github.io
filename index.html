<!doctype html>
<html lang="en">
  <head>
    <title>Sascha Grunert - Official Website</title>
    <meta charset="UTF-8" />
    <meta name="description" content="Personal homepage of Sascha Grunert, Graduate Engineer for Information Technology from Leipzig, Germany." />
    <meta name="keywords" content="sascha, grunert" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta property="og:title" content="Sascha Grunert" />
    <meta property="og:description" content="Graduate Engineer for Information Technology from Leipzig, Germany." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://saschagrunert.de" />
    <meta property="og:image" content="https://saschagrunert.de/img/Image.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet" />

    <link href="img/favicon.png" rel="shortcut icon" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header-section">
      <div class="responsive"><i class="fa fa-bars"></i></div>
      <ul class="menu-list">
        <li><a href="#home">Home</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </header>

    <section class="intro-section" id="home">
      <div class="intro-bg"></div>
      <canvas id="round"></canvas>
      <div class="intro-inner">
        <div class="intro-content">
          <div class="profile-img">
            <img src="img/Image.jpg" alt="Sascha Grunert" />
          </div>
          <h2><span class="element"></span><span class="typed-cursor">|</span></h2>
        </div>
      </div>
    </section>

    <main class="main-warp">
      <section class="contact-section" id="contact">
        <div class="contact-bg"></div>
        <div class="container">
          <h2>Reach out to me</h2>
          <div class="social-links">
            <a
              target="_blank"
              rel="noopener noreferrer"
              href="https://github.com/saschagrunert"
              class="github"
              aria-label="GitHub"
              ><i class="fab fa-github"></i
            ></a>
            <a
              target="_blank"
              rel="noopener noreferrer"
              href="https://www.linkedin.com/in/sascha-grunert"
              class="linkedin"
              aria-label="LinkedIn"
              ><i class="fab fa-linkedin"></i
            ></a>
            <a
              target="_blank"
              rel="noopener noreferrer"
              href="https://reddit.com/u/DeepInsidee"
              class="reddit"
              aria-label="Reddit"
              ><i class="fab fa-reddit"></i
            ></a>
            <a
              target="_blank"
              rel="noopener noreferrer"
              href="https://www.instagram.com/saschagrunert/"
              class="instagram"
              aria-label="Instagram"
              ><i class="fab fa-instagram"></i
            ></a>
          </div>
          <a
            href="mailto:mail@saschagrunert.de?subject=Feedback"
            class="site-btn"
            >email me</a
          >
        </div>
      </section>
    </main>

    <script src="js/fontawesome.min.js"></script>
    <script src="js/init-round.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
